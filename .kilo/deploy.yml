# Kilo Deploy Configuration
# https://kilo.ai/docs/deploy-secure/deploy

name: clickr
type: nextjs
description: 跨平台桌面AI助手 - Next.js Web版本

build:
  command: npm run build:web
  outputDir: .next

platform: kilo
autoDeploy: true
branch: main

env:
  OPENAI_API_KEY:
    required: false
    description: OpenAI API Key
  OPENAI_BASE_URL:
    required: false
    default: https://api.openai.com/v1
  OPENAI_MODEL:
    required: false
    default: gpt-3.5-turbo

