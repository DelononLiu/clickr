# Kilo Deploy Configuration
# https://kilo.ai/docs/deploy-secure/deploy

type: static
name: clickr
type: static
description: 跨平台桌面AI助手 - Web版本

build:
  command: bun install && bun run build:web
  outputDir: public
  nodeVersion: 20
  bunVersion: 1

platform: kilostatic
autoDeploy: true
branch: main

env:
  OPENAI_API_KEY:
    required: false
    description: OpenAI API Key
  OPENAI_BASE_URL:
    required: false
    default: https://api.openai.com/v1
  OPENAI_MODEL:
    required: false
    default: gpt-3.5-turbo

